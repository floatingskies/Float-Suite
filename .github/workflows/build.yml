name: Build Native Packages

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  ELECTRON_BUILDER_VERSION: '24.13.3'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Linux: .deb · .rpm · .pacman · .AppImage
  # ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (deb · rpm · pacman · AppImage)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install build prerequisites (dpkg-deb, rpm, pacman tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg rpm bsdtar zstd

      - name: Build Linux packages
        run: npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --linux deb rpm pacman AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifacts
        run: |
          ls -lh electron/dist/ || true
          echo "---"
          find electron/dist -maxdepth 1 -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pacman" -o -name "*.AppImage" \) -exec ls -lh {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: float-suite-linux
          path: |
            electron/dist/*.deb
            electron/dist/*.rpm
            electron/dist/*.pacman
            electron/dist/*.AppImage
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # macOS: .dmg (x64 + arm64)
  # ─────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (dmg)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build macOS packages
        run: npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — only enable when secrets are present (PRs fork without them)
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify artifacts
        run: |
          ls -lh electron/dist/ || true
          echo "---"
          find electron/dist -maxdepth 1 -type f -name "*.dmg" -exec ls -lh {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: float-suite-macos
          path: |
            electron/dist/*.dmg
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Windows: .exe (NSIS installer + portable)
  # ─────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (exe · portable)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci; if ($LASTEXITCODE -ne 0) { npm install }

      - name: Build Windows packages
        run: npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --win nsis portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — only enabled when secrets are present
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Verify artifacts
        run: |
          Get-ChildItem electron/dist -File | Format-Table Name, Length
          Write-Host "---"
          Get-ChildItem electron/dist -File -Include *.exe | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: float-suite-windows
          path: |
            electron/dist/*.exe
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Release: when triggered by a tag (v5.1.0 etc.), create a GitHub
  # release and attach all artifacts.
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pacman" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Float Suite ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.deb
            release/*.rpm
            release/*.pacman
            release/*.AppImage
            release/*.dmg
            release/*.exe
            release/SHA256SUMS.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
