name: Build Native Packages

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Cancel in-progress runs of the same workflow when a new commit is pushed.
# This prevents macOS jobs (which have long queue times on free tier) from
# piling up when you push several commits in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  ELECTRON_BUILDER_VERSION: '24.13.3'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Linux: .deb · .rpm · .pacman · .AppImage
  # ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (deb · rpm · pacman · AppImage)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install build prerequisites (dpkg, rpm, libarchive for pacman)
        run: |
          sudo apt-get update
          # dpkg: preinstalled on Ubuntu runners (provides dpkg-deb for .deb)
          # rpm: provides rpmbuild for .rpm
          # libarchive-tools: provides bsdtar, which electron-builder uses for .pacman
          sudo apt-get install -y dpkg rpm libarchive-tools

      - name: Build Linux packages
        # `--publish never` is mandatory: without it electron-builder
        # auto-detects a GitHub publisher from the `repository` field in
        # package.json (or the GH_TOKEN env var) and tries to upload the
        # artifacts to GitHub Releases at the end of the build. That fails
        # with a 404 because the placeholder repo doesn't exist. We publish
        # releases separately in the `release` job via softprops/action-gh-release.
        run: npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --linux deb rpm pacman AppImage --publish never
        env:
          # GH_TOKEN is intentionally NOT set here — passing it would
          # re-enable auto-publish detection. We only need it in the
          # release job.
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Verify artifacts
        run: |
          ls -lh electron/dist/ || true
          echo "---"
          find electron/dist -maxdepth 1 -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pacman" -o -name "*.AppImage" \) -exec ls -lh {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: float-suite-linux
          path: |
            electron/dist/*.deb
            electron/dist/*.rpm
            electron/dist/*.pacman
            electron/dist/*.AppImage
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # macOS: .dmg (x64 + arm64)
  # ─────────────────────────────────────────────────────────────────────
  # NOTE: macOS runners on free GitHub plans have limited availability
  # and 10x billing multiplier. If this job is stuck on "picking a runner"
  # for a long time, it's likely queued behind other free-tier users.
  # Upgrade to a paid plan for faster macOS CI, or trigger builds manually
  # via workflow_dispatch only when needed.
  # We use macos-15 (Apple Silicon / arm64) — it cross-compiles x64 just
  # fine. macos-13 (Intel) is being phased out by GitHub.
  build-macos:
    name: macOS (dmg)
    runs-on: macos-15
    timeout-minutes: 45
    # Map secrets → job-level env so we can branch on them in step `if:`.
    # The `secrets` context is NOT directly allowed in step `if:` conditions,
    # but `env.*` is. We use a boolean string ('true' / 'false').
    env:
      HAS_MAC_CERT: ${{ secrets.MAC_CERTIFICATE != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS packages (unsigned)
        if: ${{ env.HAS_MAC_CERT != 'true' }}
        shell: bash
        # When no signing certificate is configured we must NOT set CSC_LINK
        # at all (not even to an empty string). electron-builder treats any
        # CSC_LINK env var as "please sign", and tries to resolve it as a
        # file path → "WIN_CSC_LINK is not correct, cannot resolve: <cwd>".
        # `--publish never` prevents electron-builder from trying to upload
        # to GitHub Releases during the build step.
        run: |
          unset CSC_LINK WIN_CSC_LINK CSC_KEY_PASSWORD 2>/dev/null || true
          unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID 2>/dev/null || true
          npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --mac dmg --publish never
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build macOS packages (signed + notarized)
        if: ${{ env.HAS_MAC_CERT == 'true' }}
        run: npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --mac dmg --publish never
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify artifacts
        run: |
          ls -lh electron/dist/ || true
          echo "---"
          find electron/dist -maxdepth 1 -type f -name "*.dmg" -exec ls -lh {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: float-suite-macos
          path: |
            electron/dist/*.dmg
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Windows: .exe (NSIS installer + portable)
  # ─────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (exe · portable)
    runs-on: windows-2022
    timeout-minutes: 45
    # Map secrets → job-level env so we can branch on them in step `if:`.
    # The `secrets` context is NOT directly allowed in step `if:` conditions,
    # but `env.*` is. We use a boolean string ('true' / 'false').
    env:
      HAS_WIN_CERT: ${{ secrets.WIN_CERTIFICATE != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows packages (unsigned)
        if: ${{ env.HAS_WIN_CERT != 'true' }}
        shell: bash
        # When no signing certificate is configured we must NOT set CSC_LINK
        # at all (not even to an empty string). electron-builder treats any
        # CSC_LINK env var as "please sign", and tries to resolve it as a
        # file path → "WIN_CSC_LINK is not correct, cannot resolve: <cwd>".
        # Unsetting the vars + not declaring them in `env:` is enough.
        # `--publish never` prevents the builder from trying to upload to
        # GitHub Releases during the build step.
        run: |
          unset CSC_LINK WIN_CSC_LINK CSC_KEY_PASSWORD 2>/dev/null || true
          npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --win nsis portable --publish never
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build Windows packages (signed)
        if: ${{ env.HAS_WIN_CERT == 'true' }}
        run: npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --win nsis portable --publish never
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Verify artifacts
        shell: pwsh
        run: |
          Get-ChildItem electron/dist -File -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "---"
          Get-ChildItem electron/dist -File -Filter *.exe -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: float-suite-windows
          path: |
            electron/dist/*.exe
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Release: when triggered by a tag (v5.1.0 etc.), create a GitHub
  # release and attach all artifacts.
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pacman" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Float Suite ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.deb
            release/*.rpm
            release/*.pacman
            release/*.AppImage
            release/*.dmg
            release/*.exe
            release/SHA256SUMS.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
