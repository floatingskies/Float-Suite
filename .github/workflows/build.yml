name: Build Native Packages

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Cancel in-progress runs of the same workflow when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  ELECTRON_BUILDER_VERSION: '24.13.3'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Linux: .deb · .rpm · .pacman · .AppImage  (3 apps in parallel)
  # ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux — ${{ matrix.app }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: [paint, inkling, thesis]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install build prerequisites (dpkg, rpm, libarchive for pacman)
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg rpm libarchive-tools

      - name: Build ${{ matrix.app }} for Linux
        run: npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --linux deb rpm pacman AppImage --config apps/${{ matrix.app }}.json --publish never
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Verify artifacts
        run: |
          ls -lh electron/dist/${{ matrix.app }}/ || true
          echo "---"
          find electron/dist/${{ matrix.app }} -maxdepth 1 -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pacman" -o -name "*.AppImage" \) -exec ls -lh {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: float-suite-linux-${{ matrix.app }}
          path: |
            electron/dist/${{ matrix.app }}/*.deb
            electron/dist/${{ matrix.app }}/*.rpm
            electron/dist/${{ matrix.app }}/*.pacman
            electron/dist/${{ matrix.app }}/*.AppImage
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # macOS: .dmg  (3 apps in parallel)
  # ─────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS — ${{ matrix.app }}
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        app: [paint, inkling, thesis]
    env:
      HAS_MAC_CERT: ${{ secrets.MAC_CERTIFICATE != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }} for macOS (unsigned)
        if: ${{ env.HAS_MAC_CERT != 'true' }}
        shell: bash
        run: |
          unset CSC_LINK WIN_CSC_LINK CSC_KEY_PASSWORD 2>/dev/null || true
          unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID 2>/dev/null || true
          npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --mac dmg --config apps/${{ matrix.app }}.json --publish never
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build ${{ matrix.app }} for macOS (signed + notarized)
        if: ${{ env.HAS_MAC_CERT == 'true' }}
        run: npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --mac dmg --config apps/${{ matrix.app }}.json --publish never
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify artifacts
        run: |
          ls -lh electron/dist/${{ matrix.app }}/ || true
          echo "---"
          find electron/dist/${{ matrix.app }} -maxdepth 1 -type f -name "*.dmg" -exec ls -lh {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: float-suite-macos-${{ matrix.app }}
          path: |
            electron/dist/${{ matrix.app }}/*.dmg
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Windows: .exe  (3 apps in parallel)
  # ─────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows — ${{ matrix.app }}
    runs-on: windows-2022
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        app: [paint, inkling, thesis]
    env:
      HAS_WIN_CERT: ${{ secrets.WIN_CERTIFICATE != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }} for Windows (unsigned)
        if: ${{ env.HAS_WIN_CERT != 'true' }}
        shell: bash
        run: |
          unset CSC_LINK WIN_CSC_LINK CSC_KEY_PASSWORD 2>/dev/null || true
          npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --win nsis portable --config apps/${{ matrix.app }}.json --publish never
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build ${{ matrix.app }} for Windows (signed)
        if: ${{ env.HAS_WIN_CERT == 'true' }}
        run: npx --yes electron-builder@${{ env.ELECTRON_BUILDER_VERSION }} --win nsis portable --config apps/${{ matrix.app }}.json --publish never
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Verify artifacts
        shell: pwsh
        run: |
          Get-ChildItem electron/dist/${{ matrix.app }} -File -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "---"
          Get-ChildItem electron/dist/${{ matrix.app }} -File -Filter *.exe -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: float-suite-windows-${{ matrix.app }}
          path: |
            electron/dist/${{ matrix.app }}/*.exe
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Release: when triggered by a tag (v5.1.0 etc.), create a GitHub
  # release and attach all artifacts from all 3 apps × 3 platforms.
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pacman" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" \) -exec cp {} release/ \;
          echo "=== Files to release ==="
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Float Suite ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.deb
            release/*.rpm
            release/*.pacman
            release/*.AppImage
            release/*.dmg
            release/*.exe
            release/SHA256SUMS.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
