<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Paint.web — yellow background, black paint brush, neo-brutalist. -->
  <defs>
    <style>
      .stroke{fill:none;stroke:#000;stroke-width:3.5;stroke-linejoin:round;stroke-linecap:round}
    </style>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" fill="#FFDE59"/>
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#000" stroke-width="3.5"/>
  <!-- Hard shadow offset (neo-brutalist) -->
  <g transform="translate(3,3)">
    <!-- Brush handle (diagonal) -->
    <rect x="34" y="6" width="8" height="36" transform="rotate(45 38 24)" fill="#000"/>
    <!-- Ferrule (metal band) -->
    <rect x="22" y="28" width="14" height="6" transform="rotate(45 29 31)" fill="#fff" stroke="#000" stroke-width="3"/>
    <!-- Brush tip (the painting end) -->
    <path d="M 12 44 L 22 36 L 28 42 L 18 52 Z" fill="#000"/>
    <!-- Paint drip -->
    <circle cx="14" cy="54" r="3" fill="#000"/>
    <!-- Paint dab on the bristles -->
    <ellipse cx="20" cy="46" rx="3" ry="2" fill="#FF3355" transform="rotate(45 20 46)"/>
  </g>
  <!-- Foreground (same shapes, no offset) -->
  <!-- Brush handle -->
  <rect x="34" y="6" width="8" height="36" transform="rotate(45 38 24)" fill="#FF3355" stroke="#000" stroke-width="3.5"/>
  <!-- Ferrule -->
  <rect x="22" y="28" width="14" height="6" transform="rotate(45 29 31)" fill="#fff" stroke="#000" stroke-width="3.5"/>
  <!-- Brush tip -->
  <path d="M 12 44 L 22 36 L 28 42 L 18 52 Z" fill="#000" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Paint drip -->
  <circle cx="14" cy="54" r="3" fill="#000"/>
  <!-- Highlight on handle -->
  <line x1="36" y1="14" x2="44" y2="22" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
</svg>
